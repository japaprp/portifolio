<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#10213A">
  <link rel="icon" type="image/svg+xml" href="./assets/branding/favicon.svg">
  <title>Página não encontrada | Yago Fellipe Amorim</title>
  <style>
    :root {
      --bg: #f7f4ee;
      --ink: #0f172a;
      --muted: #334155;
      --line: #cbd5e1;
      --sun: #c96a1b;
      --navy: #10213a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      color: var(--ink);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1rem;
      background:
        radial-gradient(circle at 14% 12%, rgba(201, 106, 27, 0.16), transparent 42%),
        radial-gradient(circle at 90% 18%, rgba(15, 118, 110, 0.18), transparent 40%),
        linear-gradient(180deg, #fbf8f2 0%, #f7f4ee 60%, #f1ece3 100%);
    }

    .card {
      width: min(640px, 100%);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 1.4rem;
      background: #ffffff;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
    }

    h1 {
      font-size: 2rem;
      color: var(--navy);
      margin-bottom: 0.5rem;
    }

    p {
      color: var(--muted);
      margin-bottom: 1rem;
    }

    a {
      display: inline-flex;
      text-decoration: none;
      border-radius: 12px;
      padding: 0.72rem 1rem;
      font-weight: 700;
      background: linear-gradient(130deg, #f2ad5a, #ef8f3d);
      color: #1a2737;
    }
  </style>
</head>
<body>
  <article class="card">
    <h1>Página não encontrada</h1>
    <p>O conteúdo que você tentou abrir não está disponível nesta rota. Volte para o portfólio principal e siga pela navegação de produtos, demos ou contato.</p>
    <a href="./index.html">Voltar ao portfólio</a>
  </article>
</body>
</html>
